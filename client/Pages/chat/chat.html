<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <nav id="navbar">
        <button id="toggle-sidebar">☰</button>
        <div class="user-info">
            <span id="username">Usuario</span>
        </div>
        <div class="navbar-actions">
            <button id="blocked-users-button">Usuarios Bloqueados</button>
            <button id="logout-button">Cerrar sesión</button>
        </div>
    </nav>


    <div id="blocked-users-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Usuarios Bloqueados</h2>
            <ul id="blocked-users-list">
                
            </ul>
        </div>
    </div>

    <div id="main-container">
        <aside id="sidebar">
            <h3>Usuarios Conectados</h3>
            <ul id="users-list"></ul>
        </aside>

        <section id="chat">
            <div id="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <span>Cargando mensajes antiguos...</span>
            </div>
            <ul id="messages"></ul>
            <div id="typing-status" style="height: 20px; font-size: 0.8em; color: gray; margin-left: 10px;"></div>

            <div id="emoji-picker-container" style="display: none;">
                <emoji-picker class="light"></emoji-picker>
            </div>

            <form id="form">
                <input id="input" type="text" placeholder="Type a message" autocomplete="off">
                <button type="button" id="emoji-button">😊</button>
                <button type="submit">Send</button>
            </form>
        </section>
    </div>

    <div id="confirm-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="confirm-title">¿Estás seguro?</h2>
            <p id="confirm-message">Esta acción no se puede deshacer.</p>
            <div class="modal-buttons">
                <button id="confirm-cancel">Cancelar</button>
                <button id="confirm-ok" class="btn-danger">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <script src="chat.js"></script>
</body>
</html>
